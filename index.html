            { q: "家裡的佛龕張伯伯很在意，居服員可以幫忙清理嗎？", a: "基本的居家環境清潔包含在服務範圍內。您可以與居服單位溝通，在固定服務時間內協助擦拭佛龕周邊，維持長輩的精神寄託空間。" },
            { q: "長照 2.0 補助的額度在 2026 年有調整嗎？", a: "目前的補助額度仍依照失能等級（2-8 級）計算。建議撥打 1966 預約評估員到府，他們會針對張伯伯的現況給予最新的額度建議。" },
            { q: "市場地址點開後可以用手機導航嗎？", a: "可以。點擊列表中的藍色連結，手機會自動開啟 Google Maps 方便直接導航前往。" },
            { q: "復康巴士要怎麼預約？", a: "需有身心障礙證明或經長照評估。萬華屬台北市服務區，需提前 3-5 天上網或電話預約。" },
            { q: "獨居長輩在家跌倒怎麼辦？", a: "政府有提供「緊急救援系統」補助，長輩佩戴隨身按鈕，發生意外可即時通報中心。" },
            { q: "喘息服務是什麼？照顧者可以休息嗎？", a: "喘息服務是讓主要照顧者暫時休息。政府補助機構或居家喘息，讓外援人力替代照護。" },
            { q: "什麼是 ABCD 級長照單位？", a: "A 級為個案管理中心，B 級為服務提供單位（如日照），C 級為巷弄長照站（共餐社交）。" },
            { q: "失智症長輩不認人，該去哪裡尋求幫助？", a: "萬華有許多「失智據點」，提供非藥物治療活動，並有家屬支持團體分享照護心得。" },
            { q: "輔具中心可以租借輪椅嗎？", a: "可以。南區輔具中心提供短期租借服務，若長期使用則建議申請政府購置補助。" },
            { q: "萬華有哪些適合輪椅長輩的公園？", a: "青年公園最推薦，步道平緩、無障礙廁所充足，且公車低地板比率高。" },
            { q: "共餐服務有分里別嗎？", a: "大部分據點以該里居民優先，但也有許多據點開放給鄰近里別的長輩參與。" },
            { q: "長照等級分為幾級？", a: "分為 1 至 8 級。2 級以上才有補助，級數越高代表失能程度越高，補助總金額也越多。" },
            { q: "家中有外籍移工，還能申請長照服務嗎？", a: "可以。但主要補助在「專業服務」、「輔具」與「交通轉送」，不包含「照顧服務」。" },
            { q: "日間照顧中心跟安養院有什麼差別？", a: "日照中心像「學校」，白天去、傍晚回；安養院則是全天候居住在機構內。" },
            { q: "萬華的健康中心在哪裡？", a: "位於和平西路三段 120 號，就在龍山寺捷運站附近，是諮詢福利的重要起點。" },
            { q: "請問申請長照需要準備什麼文件？", a: "只需身分證資料。評估員到府時會核對，重點在於長輩實際的行動與生活能力評估。" },
            { q: "假日有長照服務嗎？", a: "部分居家服務或機構喘息有提供假日時段，但需提前預約，且加成費用可能較高。" }
        ];

        let myChart = null;

        function init() {
            renderFilters();
            renderResources('all');
            renderFAQ();
            updateLiveTime();
            setInterval(updateLiveTime, 1000);
            fetchWeather();
            updateChart();
        }

        function renderFilters() {
            const container = document.getElementById('filter-container');
            Object.keys(categories).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `filter-btn py-3 px-4 rounded-xl border-2 text-left font-bold transition-all text-base-16 flex justify-between items-center bg-white border-stone-200 hover:border-orange-500`;
                btn.id = `btn-${key}`;
                btn.innerHTML = `<span>${categories[key].label}</span> <span class="opacity-30">›</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('tab-active'));
                    btn.classList.add('tab-active');
                    renderResources(key);
                };
                container.appendChild(btn);
            });
            document.getElementById('btn-all').classList.add('tab-active');
        }

        function renderResources(filter) {
            const list = document.getElementById('resource-list');
            const countDisplay = document.getElementById('item-count');
            const titleDisplay = document.getElementById('current-category-title');
            
            list.innerHTML = '';
            const filtered = filter === 'all' ? rawData : rawData.filter(i => i.type === filter);
            
            titleDisplay.innerText = categories[filter].label;
            countDisplay.innerText = `共 ${filtered.length} 筆`;

            filtered.forEach(item => {
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.address)}`;
                const card = document.createElement('div');
                const catInfo = categories[item.type];
                
                card.className = 'resource-card p-6 bg-white border border-stone-100 rounded-2xl shadow-sm transition-all flex flex-col justify-between h-full';
                card.innerHTML = `
                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="category-tag bg-${catInfo.color}-100 text-${catInfo.color}-700">${catInfo.label}</span>
                        </div>
                        <h4 class="text-xl-20 font-black text-stone-900 mb-3">${item.name}</h4>
                        <p class="text-stone-700 leading-relaxed mb-4">${item.desc}</p>
                    </div>
                    <div class="mt-auto pt-4 border-t border-stone-50">
                        <div class="flex items-start gap-2">
                            <span class="mt-1">📍</span>
                            <a href="${mapUrl}" target="_blank" class="map-link text-base-16">${item.address}</a>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function renderFAQ() {
            const container = document.getElementById('faq-list');
            faqs.forEach((item, idx) => {
                const detail = document.createElement('details');
                detail.className = 'group bg-white rounded-2xl border border-stone-200 overflow-hidden';
                detail.innerHTML = `
                    <summary class="list-none p-6 cursor-pointer font-bold text-lg-18 flex justify-between items-center hover:bg-stone-50">
                        <span>${idx + 1}. ${item.q}</span>
                        <span class="text-orange-500 group-open:rotate-180 transition-transform">▼</span>
                    </summary>
                    <div class="px-6 pb-6 text-stone-700 text-base-16 border-t border-stone-50 pt-4 leading-relaxed">
                        ${item.a}
                    </div>
                `;
                container.appendChild(detail);
            });
        }

        function updateLiveTime() {
            const now = new Date();
            const days = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            document.getElementById('live-date').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
            document.getElementById('live-time').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        async function fetchWeather() {
            try {
                // 以萬華經緯度獲取即時天氣
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=25.03&longitude=121.50&current_weather=true');
                const data = await res.json();
                document.getElementById('weather-info').innerText = `${data.current_weather.temperature}°C`;
            } catch {
                document.getElementById('weather-info').innerText = '暫無資訊';
            }
        }

        function updateChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            const counts = {};
            rawData.forEach(item => {
                counts[item.type] = (counts[item.type] || 0) + 1;
            });

            const labels = Object.keys(counts).map(key => categories[key].label);
            const dataValues = Object.values(counts);
            const backgroundColors = ['#f97316', '#3b82f6', '#22c55e', '#ef4444', '#eab308', '#a855f7'];

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: backgroundColors,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { size: 14 } } }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
