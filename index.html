            { q: "萬華哪裡可以借輪椅？", a: "萬華老人服務中心或各里的里辦公室通常有提供短期借用服務。" },
            { q: "長輩整天坐著看電視，好嗎？", a: "儘量帶他去鄰近據點共餐或參加樂齡課程，維持腦部活動減緩退化。" },
            { q: "如何觀察長輩是否有憂鬱傾向？", a: "注意睡眠、食慾不振或不再對以前喜歡的事物感興趣，及早求醫。" },
            { q: "長輩說想回老家看看？", a: "如果體力允許，陪他回去。這對長輩的心理安定有極大的幫助。" },
            { q: "家中財產如何規劃避免爭議？", a: "長輩意識清楚時，儘早討論遺囑或信託規劃，甚至法律見證。" },
            { q: "如何判斷長輩是否失智或健忘？", a: "如果記不起剛發生的事，且性格大變、失去判斷力，應至神經內科檢查。" },
            { q: "長輩晚上不睡覺，到處走動？", a: "日間多增加活動量，減少午睡，睡前避免咖啡因。檢查是否有日落症候群。" },
            { q: "居服員可以幫長輩洗衣服嗎？", a: "長照服務包含長輩本人的衣物清潔、居家環境維護，但不包含其他家屬。" },
            { q: "長輩說身體痛卻查不出病因？", a: "可能是心理因素或神經痛，陪伴與傾聽有時比吃藥更有效。" },
            { q: "萬華哪些巷弄適合推輪椅？", a: "盡量選擇大馬路人行道，避開傳統市場擁擠時段，青年公園內部步道最推薦。" },
            { q: "有緊急狀況要打給誰？", a: "救護車撥 119，長照諮詢撥 1966，張伯伯專屬居服單位則存入手機快捷鍵。" }
        ];

        function init() {
            renderFilterBtns();
            renderResources('med'); // 預設顯示醫療
            renderQA();
        }

        function renderFilterBtns() {
            const container = document.getElementById('category-btns');
            Object.keys(categories).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'w-full flex items-center gap-3 p-4 rounded-2xl border-2 border-orange-100 font-bold transition-all hover:bg-orange-50';
                btn.id = `btn-${key}`;
                btn.innerHTML = `<span class="text-2xl">${categories[key].icon}</span> ${categories[key].label}`;
                btn.onclick = () => {
                    document.querySelectorAll('#category-btns button').forEach(b => b.classList.remove('tab-active'));
                    btn.classList.add('tab-active');
                    renderResources(key);
                };
                container.appendChild(btn);
            });
            document.getElementById('btn-med').classList.add('tab-active');
        }

        function renderResources(key) {
            const grid = document.getElementById('res-grid');
            const catName = document.getElementById('current-cat-name');
            const catDesc = document.getElementById('current-cat-desc');
            const count = document.getElementById('res-count');
            
            const data = resData[key];
            catName.innerText = categories[key].label;
            catDesc.innerText = categories[key].desc;
            count.innerText = `共 ${data.length} 項`;
            grid.innerHTML = '';

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'resource-card p-5 rounded-2xl flex flex-col justify-between';
                card.innerHTML = `
                    <div>
                        <h4 class="text-lg font-black text-stone-800 mb-1">${item.n}</h4>
                        <p class="text-sm text-stone-400 mb-4 flex items-center gap-1">📍 ${item.a}</p>
                    </div>
                    <a href="${item.l}" target="_blank" class="bg-blue-50 text-blue-600 py-2 px-4 rounded-xl text-sm font-bold text-center hover:bg-blue-600 hover:text-white transition">
                        開啟 Google 地圖 ➔
                    </a>
                `;
                grid.appendChild(card);
            });
            grid.scrollTop = 0;
        }

        function renderQA() {
            const container = document.getElementById('qa-container');
            qaData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-6 rounded-3xl border-2 border-orange-100 shadow-sm';
                div.innerHTML = `
                    <div class="flex gap-3">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-black">${index + 1}</span>
                        <div>
                            <h4 class="font-black text-stone-800 mb-2 leading-tight">${item.q}</h4>
                            <p class="text-stone-500 text-sm leading-relaxed">${item.a}</p>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
