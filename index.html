<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張吉雄伯伯：萬華在地安老生活誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            background: #FFF9F2; /* 溫暖的米橘色背景 */
            background-image: 
                radial-gradient(#FFE4CC 1px, transparent 1px),
                radial-gradient(#FFE4CC 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #4A3E37;
            font-family: 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }

        /* 活潑圓潤風格 */
        .rounded-super { border-radius: 2.5rem; }
        
        .hero-gradient {
            background: linear-gradient(135deg, #FF9D66 0%, #FFB347 100%);
        }

        /* 修正照片比例與邊框 */
        .photo-frame {
            border: 12px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            background: white;
        }
        .photo-frame:hover {
            transform: scale(1.02) rotate(1deg);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 標籤切換樣式 */
        .tab-active {
            background-color: #FF7E3D !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(255, 126, 61, 0.4);
            transform: scale(1.05);
        }

        .resource-card {
            border: 2px solid #FFE4CC;
            transition: all 0.2s ease;
        }
        .resource-card:hover {
            border-color: #FF7E3D;
            background-color: #FFF;
        }

        /* 手寫風格裝飾 */
        .hand-drawn-border {
            border: 3px solid #4A3E37;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }

        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #FF9D66; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <!-- 頂部跑馬燈 -->
    <div class="bg-orange-500 text-white py-2 overflow-hidden whitespace-nowrap">
        <div class="inline-block animate-marquee px-4">
            🌤️ 2026年 5月 1日 萬華天氣晴 ｜ 長輩健康叮嚀：今天氣溫較高，請記得多補充水分喔！ ｜ 📍 萬華區即時長照諮詢：1966
        </div>
    </div>

    <!-- 主視覺區 -->
    <header class="relative px-4 pt-10 pb-20 overflow-hidden">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-10">
            <div class="md:w-1/2 z-10 text-center md:text-left">
                <span class="inline-block px-4 py-1 bg-white text-orange-600 rounded-full text-sm font-bold mb-4 shadow-sm">萬華在地安老數位誌</span>
                <h1 class="text-5xl md:text-7xl font-black text-stone-800 leading-tight mb-6">
                    陪伴張伯伯<br><span class="text-orange-500 underline decoration-wavy decoration-orange-300">自在過生活</span>
                </h1>
                <p class="text-xl text-stone-600 mb-8 max-w-md">
                    這裡記錄了萬華區最適宜長輩活動的角落，讓每一位長者都能在熟悉的巷弄裡，感受到最溫暖的守護。
                </p>
                <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                    <a href="#resources" class="bg-orange-500 text-white px-8 py-4 rounded-full font-black text-lg hover:bg-orange-600 transition shadow-lg">看社區資源</a>
                    <a href="#qa" class="bg-white text-orange-500 border-2 border-orange-500 px-8 py-4 rounded-full font-black text-lg hover:bg-orange-50 transition">常見問答</a>
                </div>
            </div>
            <div class="md:w-1/2 relative">
                <!-- 修正比例的照片牆 -->
                <div class="relative w-full aspect-square">
                    <div class="absolute top-0 left-10 w-2/3 aspect-[4/3] photo-frame -rotate-3 z-20">
                        <img src="LINE_ALBUM_51%E7%AC%AC%E4%B8%89%E6%AC%A1%E5%AE%B6%E8%A8%AA_260501_12.jpg" alt="家訪照1">
                    </div>
                    <div class="absolute bottom-10 right-0 w-3/5 aspect-square photo-frame rotate-6 z-30">
                        <img src="LINE_ALBUM_51%E7%AC%AC%E4%B8%89%E6%AC%A1%E5%AE%B6%E8%A8%AA_260501_8.jpg" alt="家訪照2">
                    </div>
                    <div class="absolute bottom-20 left-0 w-1/2 aspect-video photo-frame -rotate-6 z-10 opacity-80">
                        <img src="LINE_NOTE_260501_5.jpg" alt="家訪照3">
                    </div>
                    <!-- 裝飾元素 -->
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full border-4 border-orange-200 rounded-full -z-10 animate-pulse"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- 資源搜尋區 -->
    <section id="resources" class="max-w-7xl mx-auto px-4 py-20">
        <div class="bg-white rounded-super shadow-2xl overflow-hidden border-8 border-orange-100">
            <div class="p-10 text-center bg-orange-50">
                <h2 class="text-4xl font-black text-stone-800 mb-4">萬華長輩生活寶庫</h2>
                <p class="text-stone-500">我們為張伯伯整理了這些充滿人情味的地點</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12">
                <!-- 側邊分類 -->
                <div class="lg:col-span-3 p-6 bg-white border-r border-orange-50">
                    <div class="flex flex-col gap-3" id="filter-container">
                        <!-- 動態生成按鈕 -->
                    </div>
                </div>
                
                <!-- 列表展示 -->
                <div class="lg:col-span-9 p-8">
                    <div class="flex justify-between items-center mb-8">
                        <h3 id="category-title" class="text-2xl font-black text-orange-600">全部寶地</h3>
                        <span id="result-count" class="px-4 py-1 bg-orange-100 text-orange-700 rounded-full font-bold text-sm"></span>
                    </div>
                    <div id="resource-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-h-[600px] overflow-y-auto pr-4 custom-scroll">
                        <!-- 動態生成卡片 -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 問答區 -->
    <section id="qa" class="max-w-4xl mx-auto px-4 py-20">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-black mb-4">家屬小撇步 Q&A</h2>
            <p class="text-stone-500 italic">您擔心的問題，我們都有答案</p>
        </div>
        <div class="space-y-4" id="qa-list"></div>
    </section>

    <!-- 頁尾 -->
    <footer class="text-center py-10 opacity-60">
        <p class="text-sm">© 2026 萬華在地安老數位誌｜守護張吉雄伯伯與社區長輩的每一天</p>
    </footer>

    <script>
        const categories = {
            'all': { label: '通通都有', icon: '🏠', color: '#4A3E37' },
            'medical': { label: '看病拿藥', icon: '🩺', color: '#4A90E2' },
            'market': { label: '逛街採買', icon: '🥬', color: '#F5A623' },
            'care': { label: '居家服務', icon: '🫂', color: '#D0021B' },
            'social': { label: '找人聊天', icon: '🍵', color: '#7ED321' },
            'travel': { label: '散步運動', icon: '🏸', color: '#50E3C2' }
        };

        const resourceData = [];
        const baseNames = {
            'medical': ['和平醫院', '西園醫院', '萬華健康中心', '藥局專區', '復健診所'],
            'market': ['國光市場', '雙和市場', '直興市場', '全聯萬大店', '美廉社'],
            'care': ['老人服務中心', '聖若瑟長照', '立心基金會', '失智基金會', '日間照顧'],
            'social': ['里辦公室', '社區據點', '長青學苑', '樂齡教室', '里民共餐'],
            'travel': ['青年公園', '馬場町', '龍山寺', '剝皮寮', '華中步道']
        };

        const qaData = [
            { q: "長輩如果不願意讓陌生人(居服員)進家門怎麼辦？", a: "這很常見！建議先從『送餐』或『陪同外出散步』開始，讓長輩覺得是多了一個朋友，而不是被照顧者。家人初期在場陪同也非常重要。" },
            { q: "萬華區有哪些適合輪椅族的散步路徑？", a: "青年公園的步道非常寬敞且平坦，馬場町河濱公園也是絕佳選擇，無障礙坡道規劃很完善。" },
            { q: "如何申請 1966 長照服務？", a: "只要撥打 1966 專線，專員會問一些基本狀況，之後會安排『照管專員』到家裡做評估，完全免費喔！" },
            { q: "輔具補助可以幾年申請一次？", a: "一般而言是每三年可申請四項，像是拐杖、輪椅或洗澡椅都在補助範圍內，記得先評估再購買才有補助喔。" },
            { q: "餐食營養不夠，萬華哪裡有共餐？", a: "許多里辦公處（如福恩里、新安里）都有提供長輩共餐，不僅飯菜營養均衡，還能跟鄰居聊天，心情更好！" }
            // 為簡潔展示，此處列出 5 題代表
        ];

        function init() {
            // 生成模擬數據
            Object.keys(baseNames).forEach(type => {
                baseNames[type].forEach((name, i) => {
                    resourceData.push({
                        type: type,
                        name: name,
                        address: `萬華區鄰里巷弄內 No.${10 + i}`,
                        desc: `這是一個讓${categories[type].label}更方便的好地方，非常推薦張伯伯去走走。`
                    });
                });
            });

            renderFilters();
            renderResources('all');
            renderQA();
        }

        function renderFilters() {
            const container = document.getElementById('filter-container');
            Object.keys(categories).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn w-full p-4 rounded-2xl border-2 border-orange-50 text-left font-black transition-all flex items-center gap-3 hover:bg-orange-50';
                btn.innerHTML = `<span class="text-2xl">${categories[key].icon}</span> ${categories[key].label}`;
                btn.id = `btn-${key}`;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('tab-active'));
                    btn.classList.add('tab-active');
                    renderResources(key);
                };
                container.appendChild(btn);
            });
            document.getElementById('btn-all').classList.add('tab-active');
        }

        function renderResources(type) {
            const grid = document.getElementById('resource-grid');
            const title = document.getElementById('category-title');
            const count = document.getElementById('result-count');
            const filtered = type === 'all' ? resourceData : resourceData.filter(d => d.type === type);

            title.innerText = categories[type].label;
            count.innerText = `發現 ${filtered.length} 個好地方`;
            grid.innerHTML = '';

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'resource-card p-6 bg-orange-50/30 rounded-3xl';
                card.innerHTML = `
                    <div class="text-xs font-black text-orange-400 mb-2">${categories[item.type].icon} ${categories[item.type].label}</div>
                    <h4 class="text-xl font-black mb-2">${item.name}</h4>
                    <p class="text-stone-500 text-sm mb-4 leading-relaxed">${item.desc}</p>
                    <div class="flex items-center text-xs text-stone-400 gap-1">
                        <span>📍</span> ${item.address}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderQA() {
            const container = document.getElementById('qa-list');
            qaData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-white p-6 rounded-3xl shadow-sm border-2 border-orange-100';
                div.innerHTML = `
                    <h4 class="font-black text-orange-600 mb-3 flex gap-2">
                        <span class="bg-orange-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">Q</span>
                        ${item.q}
                    </h4>
                    <p class="text-stone-600 pl-8 leading-relaxed">${item.a}</p>
                `;
                container.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
