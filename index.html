<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬華在地安老數位誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            background: #FFFBF7;
            color: #4A3E37;
            font-family: 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }

        .rounded-super { border-radius: 2rem; }
        
        /* 模擬地圖樣式 */
        .map-container {
            position: relative;
            background: #f0ede9;
            background-image: 
                linear-gradient(#e5e1dc 1px, transparent 1px),
                linear-gradient(90deg, #e5e1dc 1px, transparent 1px);
            background-size: 30px 30px;
            height: 400px;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .map-road {
            position: absolute;
            background: #d1ccc7;
            border-radius: 20px;
        }

        .bus-marker {
            position: absolute;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .station-node {
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border: 3px solid #FF7E3D;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        .station-label {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            background: rgba(255,255,255,0.8);
            padding: 2px 6px;
            border-radius: 4px;
            transform: translate(-50%, 15px);
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .active-pulse {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #FF7E3D;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-ring 2s infinite;
            z-index: 10;
        }

        .photo-frame {
            border: 8px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #eee;
        }

        .animate-marquee { 
            display: inline-block;
            animation: marquee 30s linear infinite; 
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="pb-10">

    <!-- 跑馬燈 -->
    <div class="bg-stone-800 text-white py-2 overflow-hidden whitespace-nowrap sticky top-0 z-50">
        <div class="animate-marquee px-4 font-bold">
            💡 萬華長輩生活寶庫：理解是對長輩最好的陪伴 ｜ 🚌 公車動態即時模擬中 ｜ 📍 1966 長照專線隨時為您服務 ｜ 🏥 萬華健康中心關心您
        </div>
    </div>

    <!-- 主標題 -->
    <header class="max-w-6xl mx-auto px-6 pt-12 pb-8 flex flex-col md:flex-row items-center gap-8">
        <div class="flex-1 text-center md:text-left">
            <h1 class="text-5xl font-black text-stone-800 mb-4">萬華長輩<span class="text-orange-500">生活地圖</span></h1>
            <p class="text-lg text-stone-600 font-medium">記錄環河南路張先生的日常，為家屬提供最在地的照顧資源。</p>
        </div>
        <div class="w-32 h-32 bg-orange-100 rounded-full flex items-center justify-center text-5xl shadow-inner">👴</div>
    </header>

    <!-- 公車動態與地圖 -->
    <section class="max-w-6xl mx-auto px-4 mb-12">
        <div class="bg-white rounded-super p-6 md:p-10 shadow-xl border border-stone-100">
            <div class="flex items-center gap-3 mb-8">
                <div class="bg-blue-500 text-white p-2 rounded-lg">🚌</div>
                <h2 class="text-2xl font-black text-stone-800">1 日生活圈公車動態模擬</h2>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 左側：模擬地圖 -->
                <div class="lg:col-span-2">
                    <div id="wanhua-map" class="map-container">
                        <!-- 道路模擬 -->
                        <div class="map-road" style="width: 80%; height: 12px; left: 10%; top: 40%;"></div>
                        <div class="map-road" style="width: 12px; height: 50%; left: 30%; top: 10%;"></div>
                        <div class="map-road" style="width: 12px; height: 50%; left: 70%; top: 20%;"></div>
                        
                        <!-- 站點 -->
                        <div id="stations-layer"></div>
                        
                        <!-- 脈動效果 -->
                        <div id="pulse-layer"></div>

                        <!-- 公車圖標 -->
                        <div id="bus-sprite" class="bus-marker text-3xl">🚌</div>
                        
                        <div class="absolute bottom-4 right-4 bg-white/90 p-3 rounded-xl shadow-sm text-xs font-bold border border-stone-200">
                            📍 萬華區環河南路生活路網
                        </div>
                    </div>
                </div>

                <!-- 右側：行程詳細說明 -->
                <div class="bg-stone-50 rounded-2xl p-6 border border-stone-200 flex flex-col justify-between">
                    <div>
                        <h3 class="font-black text-stone-800 text-xl mb-4 flex justify-between items-center">
                            目前位置 
                            <span id="current-time-tag" class="text-sm bg-orange-500 text-white px-3 py-1 rounded-full">08:30</span>
                        </h3>
                        <div id="step-details" class="space-y-4">
                            <!-- 由 JS 動態填入 -->
                        </div>
                    </div>
                    <div class="mt-6 pt-6 border-t border-stone-200">
                        <div class="flex items-center gap-2 text-blue-600 font-bold mb-2">
                            <span class="relative flex h-3 w-3">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                            </span>
                            即時模擬狀態
                        </div>
                        <p id="bus-status-text" class="text-sm text-stone-500 font-medium italic">正在尋找公車位置...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 資源卡片與QA -->
    <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-8 mb-20">
        
        <!-- 家屬小撇步 6 招 -->
        <div class="bg-orange-50 rounded-super p-8 border-2 border-orange-100">
            <h2 class="text-2xl font-black text-orange-800 mb-6 flex items-center gap-2">
                <span>💡</span> 家屬照顧 6 招撇步
            </h2>
            <div class="grid grid-cols-1 gap-4" id="qa-list">
                <!-- JS 填入 -->
            </div>
        </div>

        <!-- 資源清單快速看 -->
        <div class="bg-white rounded-super p-8 shadow-lg border border-stone-100">
            <h2 class="text-2xl font-black text-stone-800 mb-6 flex items-center gap-2">
                <span>📍</span> 關鍵資源與環境
            </h2>
            <div class="space-y-4">
                <div class="flex gap-4 p-4 bg-blue-50 rounded-2xl">
                    <div class="w-20 h-20 rounded-xl photo-frame flex-shrink-0 overflow-hidden">
                        <img src="LINE_NOTE_260501_5.jpg" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h4 class="font-bold text-blue-900">居家生活環境</h4>
                        <p class="text-sm text-blue-700 leading-snug">注意無電梯公寓的樓梯安全，適時增加扶手與防滑措施。</p>
                    </div>
                </div>
                <div class="flex gap-4 p-4 bg-green-50 rounded-2xl">
                    <div class="w-20 h-20 rounded-xl photo-frame flex-shrink-0 overflow-hidden">
                        <img src="LINE_ALBUM_51%E7%AC%AC%E4%B8%89%E6%AC%A1%E5%AE%B6%E8%A8%AA_260501_8.jpg" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h4 class="font-bold text-green-900">健康巡迴諮詢</h4>
                        <p class="text-sm text-green-700 leading-snug">善用診所與長照中心的測量服務，隨時掌握長輩血壓狀況。</p>
                    </div>
                </div>
            </div>
            <a href="#" class="block text-center mt-8 text-stone-400 font-bold hover:text-orange-500 underline">查看更多長照資源清單 →</a>
        </div>
    </div>

    <script>
        const stops = [
            { id: 1, name: '華中河濱公園', x: 15, y: 40, time: '08:30', desc: '早起散步的好地方，也是公車起點。', line: '202, 307' },
            { id: 2, name: '國光市場', x: 30, y: 15, time: '09:45', desc: '採買新鮮食材，絞肉與糙米飯的來源。', line: '步行抵達' },
            { id: 3, name: '東京診所', x: 50, y: 40, time: '11:00', desc: '例行性拿藥與健康檢查。', line: '202, 601' },
            { id: 4, name: '萬華老人服務中心', x: 70, y: 25, time: '12:30', desc: '共餐與老鄰居聊天的社交熱點。', line: '307' },
            { id: 5, name: '返家(環河南路)', x: 85, y: 40, time: '15:30', desc: '結束充實的一天，回家休息。', line: '隨時返家' }
        ];

        const qaData = [
            { q: "拒絕居服員進門？", a: "從『陪同散步』開始。讓長輩覺得是多了個隨扈，而非被照顧。" },
            { q: "不願意坐輪椅？", a: "改說：『這能讓你走得更遠、看更多漂亮風景』。" },
            { q: "不愛喝水怎麼辦？", a: "準備在地特色淡茶或果汁，分裝在小瓶子內增加意願。" },
            { q: "冰箱食物總是不減？", a: "檢查保存期限，改以少量多樣的餐盒取代大鍋菜。" },
            { q: "照顧者感到疲累？", a: "撥打1966申請喘息服務，給自己幾天假，別獨自承受。" },
            { q: "長輩總是不肯吃藥？", a: "使用精美的藥盒分類，並給予口頭稱讚作為正面回饋。" }
        ];

        let currentIndex = 0;

        function initMap() {
            const stationsLayer = document.getElementById('stations-layer');
            stationsLayer.innerHTML = '';
            stops.forEach(stop => {
                stationsLayer.innerHTML += `
                    <div class="station-node" style="left: ${stop.x}%; top: ${stop.y}%;"></div>
                    <div class="station-label" style="left: ${stop.x}%; top: ${stop.y}%;">${stop.name}</div>
                `;
            });
            updateBusPosition();
        }

        function updateBusPosition() {
            const bus = document.getElementById('bus-sprite');
            const pulseLayer = document.getElementById('pulse-layer');
            const details = document.getElementById('step-details');
            const timeTag = document.getElementById('current-time-tag');
            const statusText = document.getElementById('bus-status-text');
            
            const stop = stops[currentIndex];

            // 移動公車
            bus.style.left = `calc(${stop.x}% - 15px)`;
            bus.style.top = `calc(${stop.y}% - 25px)`;

            // 更新脈動
            pulseLayer.innerHTML = `<div class="active-pulse" style="left: ${stop.x}%; top: ${stop.y}%;"></div>`;

            // 更新說明文字
            timeTag.innerText = stop.time;
            details.innerHTML = `
                <div class="animate-fadeIn">
                    <h4 class="text-orange-600 font-black text-lg mb-1">${stop.name}</h4>
                    <p class="text-stone-700 leading-relaxed font-medium">${stop.desc}</p>
                    <div class="mt-3 inline-block bg-white px-3 py-1 rounded-lg border border-stone-200 text-xs font-bold text-stone-500">
                        主要交通：${stop.line}
                    </div>
                </div>
            `;
            statusText.innerText = `目前公車已抵達 ${stop.name}，一切正常。`;

            // 輪播
            currentIndex = (currentIndex + 1) % stops.length;
        }

        function renderQA() {
            const container = document.getElementById('qa-list');
            qaData.forEach((item, i) => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                        <div class="flex gap-3">
                            <span class="text-orange-500 font-black">0${i+1}</span>
                            <div>
                                <h4 class="font-black text-stone-800 text-sm mb-1">${item.q}</h4>
                                <p class="text-xs text-stone-500">${item.a}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 啟動
        window.onload = () => {
            initMap();
            renderQA();
            setInterval(updateBusPosition, 4000);
        };
    </script>
</body>
</html>
