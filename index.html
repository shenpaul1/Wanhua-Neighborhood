            { q: "萬華哪裡有免費的血壓量測與健康諮詢？", a: "萬華區健康中心、各大巷弄長照站（C據點）及部分健保藥局，皆有提供血壓計與健康小組諮詢服務。" },
            { q: "如果長輩走失，萬華區警察局有防範服務嗎？", a: "可帶長輩至萬華分局各派出所進行「指紋捺印」，並向社會局申請愛心手鍊。建議家屬也要在長輩常穿的衣物內側燙上聯絡資訊。" },
            { q: "失智長輩不肯吃藥，這也算在長照服務內嗎？", a: "居家服務的照服員可以提供「用藥叮嚀」或「陪伴就醫」。但醫學對策建議與西園醫院或中興院區的老年醫學科醫師詳談。" },
            { q: "萬華共餐據點一定要設籍該里嗎？", a: "通常不限制，但為了管理方便，建議優先選擇居住地附近的據點，方便志工日後關懷訪視。部分熱門據點可能需預約。" },
            { q: "輔具壞了，萬華有維修的地方嗎？", a: "可致電輔具中心詢問「輔具維修專車」的時間。一些小問題，在地一些輪椅醫療器材行（西園路、萬大路周邊）也能處理。" },
            { q: "我快要累垮了，有家屬支持團體嗎？", a: "萬華區設有「家庭照顧者支持中心」，提供心理諮商、舒壓課程，甚至可以媒合志工幫您短暫看顧長輩，讓您下樓喝杯咖啡喘口氣。" },
            { q: "申請長照補助需要財產證明嗎？", a: "一般戶申請「服務額度」不需要財產證明，但若要爭取「低收入/中低收入」的更高自付額減免，則需要向區公所申請相關資格證明。" },
            { q: "可以指定男/女照服員來家裡嗎？", a: "可以提出需求。例如洗澡服務，家屬常會要求同性照服員。我們會盡量協調媒合，但需視各居服單位的現有人力而定。" }
        ];

        // 初始化功能
        function init() {
            renderFilters();
            renderResources('all');
            renderFAQ();
            updateLiveTime();
            setInterval(updateLiveTime, 1000);
            initChart();
            fetchWeather();
        }

        // 渲染分類按鈕
        function renderFilters() {
            const container = document.getElementById('filter-container');
            Object.keys(categories).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `filter-btn py-3 px-4 rounded-xl border-2 text-left font-bold transition-all text-base-16 flex justify-between items-center bg-white border-stone-200 hover:border-orange-500`;
                btn.id = `btn-${key}`;
                btn.innerHTML = `<span>${categories[key].label}</span> <span class="opacity-30">›</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('tab-active'));
                    btn.classList.add('tab-active');
                    renderResources(key);
                };
                container.appendChild(btn);
            });
            document.getElementById('btn-all').classList.add('tab-active');
        }

        // 渲染資源列表
        function renderResources(filter) {
            const list = document.getElementById('resource-list');
            const countDisplay = document.getElementById('item-count');
            const titleDisplay = document.getElementById('current-category-title');
            
            list.innerHTML = '';
            const filtered = filter === 'all' ? rawData : rawData.filter(i => i.type === filter);
            
            titleDisplay.innerText = categories[filter].label;
            countDisplay.innerText = `共 ${filtered.length} 筆`;

            filtered.forEach(item => {
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.address)}`;
                const card = document.createElement('div');
                card.className = 'resource-card p-6 bg-white border border-stone-100 rounded-2xl shadow-sm transition-all flex flex-col justify-between h-full';
                card.innerHTML = `
                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="w-3 h-3 rounded-full bg-${categories[item.type].color}-500"></span>
                            <span class="text-sm font-bold text-stone-500">${categories[item.type].label}</span>
                        </div>
                        <h4 class="text-xl-20 font-black text-stone-900 mb-3">${item.name}</h4>
                        <p class="text-stone-700 leading-relaxed mb-4">${item.desc}</p>
                    </div>
                    <div class="mt-auto pt-4 border-t border-stone-50">
                        <div class="flex items-start gap-2">
                            <span class="mt-1">📍</span>
                            <a href="${mapUrl}" target="_blank" class="map-link text-base-16">${item.address}</a>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // 渲染問答
        function renderFAQ() {
            const container = document.getElementById('faq-list');
            faqs.forEach((item, idx) => {
                const detail = document.createElement('details');
                detail.className = 'group bg-white rounded-2xl border border-stone-200 overflow-hidden';
                detail.innerHTML = `
                    <summary class="list-none p-6 cursor-pointer font-bold text-lg-18 flex justify-between items-center hover:bg-stone-50">
                        <span>${idx + 1}. ${item.q}</span>
                        <span class="text-orange-500 group-open:rotate-180 transition-transform">▼</span>
                    </summary>
                    <div class="px-6 pb-6 text-stone-700 text-base-16 border-t border-stone-50 pt-4 leading-relaxed">
                        ${item.a}
                    </div>
                `;
                container.appendChild(detail);
            });
        }

        function updateLiveTime() {
            const now = new Date();
            const days = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            document.getElementById('live-date').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
            document.getElementById('live-time').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=25.03&longitude=121.50&current_weather=true');
                const data = await res.json();
                const temp = data.current_weather.temperature;
                document.getElementById('weather-info').innerText = `${temp}°C (氣溫舒適，適合外出)`;
            } catch {
                document.getElementById('weather-info').innerText = '讀取失敗';
            }
        }

        function initChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['日照/居家', '醫療/健檢', '社交/學習', '共餐/物資'],
                    datasets: [{
                        data: [10, 10, 10, 10],
                        backgroundColor: ['#f97316', '#3b82f6', '#22c55e', '#ef4444'],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
